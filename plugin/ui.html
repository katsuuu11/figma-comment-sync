<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Annotation Config</title>
    <style>
      :root {
        --text: #202124;
        --muted: #6b7280;
        --line: #e5e7eb;
        --card: #f3f4f6;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        color: var(--text);
        margin: 14px;
      }

      h1 {
        font-size: 13px;
        margin: 0 0 12px;
        font-weight: 600;
      }

      h2 {
        font-size: 12px;
        margin: 14px 0 6px;
        font-weight: 600;
      }

      .row {
        display: flex;
        gap: 6px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 12px;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      #addBtn {
        padding: 5px 8px;
        white-space: nowrap;
      }

      ul {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        border-radius: 10px;
        background: var(--card);
      }

      .member-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 8px;
      }

      .remove-btn {
        padding: 4px 8px;
        font-size: 11px;
      }

      .footer {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      #saveBtn {
        background: #111111;
        border-color: #111111;
        color: #ffffff;
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>設定</h1>

    <h2>メンバー</h2>
    <div class="row">
      <input id="memberInput" placeholder="名前を入力" />
      <button id="addBtn">追加</button>
    </div>
    <ul id="memberList"></ul>

    <h2>Apps Script URL</h2>
    <input id="endpointInput" placeholder="https://script.google.com/macros/s/.../exec" />
    <div class="hint">保存後にウィジェットの保存ボタンから送信できます。</div>

    <div class="footer">
      <button id="cancelBtn">閉じる</button>
      <button id="saveBtn">保存</button>
    </div>

    <script>
      let state = { endpointUrl: '', members: [] };

      const memberInput = document.getElementById('memberInput');
      const endpointInput = document.getElementById('endpointInput');
      const memberList = document.getElementById('memberList');

      function render() {
        endpointInput.value = state.endpointUrl;
        memberList.innerHTML = '';
        state.members.forEach((member, index) => {
          const li = document.createElement('li');

          const name = document.createElement('span');
          name.className = 'member-name';
          name.textContent = member;

          const remove = document.createElement('button');
          remove.className = 'remove-btn';
          remove.textContent = '削除';
          remove.addEventListener('click', () => {
            state.members.splice(index, 1);
            render();
          });

          li.appendChild(name);
          li.appendChild(remove);
          memberList.appendChild(li);
        });
      }

      document.getElementById('addBtn').addEventListener('click', () => {
        const name = memberInput.value.trim();
        if (!name) return;
        if (!state.members.includes(name)) {
          state.members.push(name);
        }
        memberInput.value = '';
        render();
      });

      document.getElementById('saveBtn').addEventListener('click', () => {
        state.endpointUrl = endpointInput.value.trim();
        parent.postMessage({ pluginMessage: { type: 'save-config', config: state } }, '*');
      });

      document.getElementById('cancelBtn').addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      });

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'init' || msg.type === 'saved') {
          state = {
            endpointUrl: msg.config?.endpointUrl || '',
            members: Array.isArray(msg.config?.members) ? msg.config.members : [],
          };
          render();
        }
      };
    </script>
  </body>
</html>
